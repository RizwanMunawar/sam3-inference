name: SAM3 Inference CI

on:
  push:
    branches: [ main, ci ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  model_smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install PyTorch
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            pip install torch torchvision torchaudio
          else
            pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          fi

      - name: Install package + runtime deps
        shell: bash
        run: |
          pip install -e .
          pip install pillow opencv-python
          pip install google-api-python-client google-auth

      - name: Download sam3.pt
        shell: bash
        env:
          GDRIVE_FILE_ID: ${{ secrets.SAM3_GDRIVE_FILE_ID }}
        run: |
          python -m pip install --upgrade gdown
          python -m gdown --id "$GDRIVE_FILE_ID" -O sam3.pt

      - name: Inference
        shell: python
        run: |
          import os
          from PIL import Image
          from sam3 import build_sam3_image_model
          from sam3.model.sam3_image_processor import Sam3Processor

          assert os.path.exists("sam3.pt"), "sam3.pt not found"
          img_path = "assets/images/dogs.jpg"
          assert os.path.exists(img_path), f"{img_path} not found"

          image = Image.open(img_path)
          processor = Sam3Processor(build_sam3_image_model(checkpoint_path="sam3.pt"))
          state = processor.set_image(image)
          results = processor.set_text_prompt(state=state, prompt="dog")

          assert results is not None
          print("Smoke test OK")
